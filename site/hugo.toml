baseURL = "https://blog.mulatta.io/"
languageCode = "ko-kr"
title = "Mulatta Blog"
theme = "stack"

[params]
mainSections = ["post"]
featuredImageField = "image"
rssFullContent = true
favicon = "/favicon.ico"

[params.defaultImage.opengraph]
enabled = true
local = true
src = "img/og-default.png"

[params.footer]
since = 2025

[params.dateFormat]
published = "Jan 02, 2006"
lastUpdated = "Jan 02, 2006 15:04 MST"

[params.sidebar]
emoji = ""
subtitle = ""
[params.sidebar.avatar]
enabled = true
local = true
src = "img/avatar.jpg"

[params.article]
math = false
toc = true
readingTime = true

[params.comments]
enabled = false

[menu]
[[menu.main]]
identifier = "home"
name = "Home"
url = "/"
weight = -100
[menu.main.params]
icon = "home"

# `archives` and `search` register themselves via the `menu:` frontmatter
# block in their respective page files. Defining them here as well would
# produce duplicate sidebar entries.

[related]
includeNewer = true
threshold = 60
toLower = false
[[related.indices]]
name = "tags"
weight = 100
[[related.indices]]
name = "categories"
weight = 200

[markup]
[markup.highlight]
noClasses = false
codeFences = true
guessSyntax = true
lineNoStart = 1
lineNos = true
lineNumbersInTable = true
tabWidth = 4
